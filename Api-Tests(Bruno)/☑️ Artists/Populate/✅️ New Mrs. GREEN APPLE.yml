info:
  name: ✅️ New Mrs. GREEN APPLE
  type: http
  seq: 2

http:
  method: POST
  url: "{{APIaddress}}/artists"
  body:
    type: json
    data: |-
      {
        "urlName": "mrs-green-apple",
        "name": "Mrs. GREEN APPLE",
        "description": "Banda de rock/pop japonesa formada en 2013. Son reconocidos por sus composiciones brillantes, letras optimistas y la impresionante capacidad vocal de su líder, Motoki Ohmori. Han logrado un éxito masivo en listas de popularidad y bandas sonoras de anime.",
        "imageUrl": "https://placehold.co/800x600.png"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Extract access_token from the JSON response body
        const id = res.getBody()._id;

        // Save it to the active environment
        bru.setEnvVar("artist_MRSGREENAPPLE", id, { persist: true });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  This is a POST request, submitting data to an API via the request body. This request submits JSON data, and the data is reflected in the response.

  A successful POST request typically returns a `200 OK` or `201 Created` response code.
