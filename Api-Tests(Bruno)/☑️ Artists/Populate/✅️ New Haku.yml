info:
  name: ✅️ New Haku.
  type: http
  seq: 9

http:
  method: POST
  url: "{{APIaddress}}/artists"
  body:
    type: json
    data: |-
      {
        "urlName": "haku",
        "name": "haku. (ハク。)",
        "description": "Banda de indie rock originaria de Osaka formada en 2019. Se distinguen por su sonido fresco y melódico, liderado por la voz distintiva de su vocalista y letras que capturan la esencia de la juventud y la cotidianidad con un toque nostálgico.",
        "imageUrl": "https://placehold.co/800x600.png"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Extract access_token from the JSON response body
        const id = res.getBody()._id;

        // Save it to the active environment
        bru.setEnvVar("artist_haku", id, { persist: true });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  This is a POST request, submitting data to an API via the request body. This request submits JSON data, and the data is reflected in the response.

  A successful POST request typically returns a `200 OK` or `201 Created` response code.
