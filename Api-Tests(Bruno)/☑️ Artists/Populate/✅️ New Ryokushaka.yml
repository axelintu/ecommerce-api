info:
  name: ✅️ New Ryokushaka
  type: http
  seq: 5

http:
  method: POST
  url: "{{APIaddress}}/artists"
  body:
    type: json
    data: |-
      {
        "urlName": "ryokushaka",
        "name": "Ryokuoushoku Shakai (緑黄色社会)",
        "description": "Ryokuoushoku Shakai, abreviado como Ryokushaka, es una banda japonesa de pop rock formada en 2012 en la prefectura de Aichi. La banda está compuesta por la vocalista y guitarrista Haruko Nagaya, el guitarrista Issei Kobayashi, la tecladista Peppe y el bajista Shingo Anami.",
        "imageURL": "/images/prods/ryokushaka/66844__0_0_0.jpg"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Extract access_token from the JSON response body
        const id = res.getBody()._id;

        // Save it to the active environment
        bru.setEnvVar("artist_ryokushaka", id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  This is a POST request, submitting data to an API via the request body. This request submits JSON data, and the data is reflected in the response.

  A successful POST request typically returns a `200 OK` or `201 Created` response code.
