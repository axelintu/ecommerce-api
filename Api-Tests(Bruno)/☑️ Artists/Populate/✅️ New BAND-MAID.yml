info:
  name: ✅️ New BAND-MAID
  type: http
  seq: 3

http:
  method: POST
  url: "{{APIaddress}}/artists"
  body:
    type: json
    data: |-
      {
        "urlName": "band-maid",
        "name": "BAND-MAID",
        "description": "Banda de rock/metal japonesa formada en 2013. Su concepto está inspirado en las Café Maids, combinando un uniforme temático con música de rock y metal potente. Reconocida por sus habilidades instrumentales excepcionales y su energía en vivo.",
        "imageUrl": "https://placehold.co/800x600.png"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Extract access_token from the JSON response body
        const id = res.getBody()._id;

        // Save it to the active environment
        bru.setEnvVar("artist_BANDMAID", id, { persist: true });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  This is a POST request, submitting data to an API via the request body. This request submits JSON data, and the data is reflected in the response.

  A successful POST request typically returns a `200 OK` or `201 Created` response code.
