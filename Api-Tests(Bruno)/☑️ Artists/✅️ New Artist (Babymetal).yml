info:
  name: ✅️ New Artist (Babymetal)
  type: http
  seq: 3

http:
  method: POST
  url: "{{APIaddress}}/artists"
  body:
    type: json
    data: |-
      {
          "urlName": "babymetal",
        "name": "BABYMETAL",
        "description": "Grupo de metal/pop japonés formado en 2010.",
          "imageURL": "https://placehold.co/800x600.png",
          "backgroundImageURL": "https://placehold.co/800x600.png"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const id = res.getBody()._id;

        bru.setEnvVar("artist_babymetal", id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  This is a POST request, submitting data to an API via the request body. This request submits JSON data, and the data is reflected in the response.

  A successful POST request typically returns a `200 OK` or `201 Created` response code.
