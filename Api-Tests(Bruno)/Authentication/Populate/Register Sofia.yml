http:
  method: POST
  url: "{{APIaddress}}/auth/register"
  body:
    type: json
    data: |-
      {
      "name": "Sofía Morales Ortega",
          "email": "sofia.morales@universidad.edu",
          "password": "estudiante_2026",
          "phone": "688445566"
        }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Registers a new user account.

  Request body:

  - `name` (string): Full name of the user
      
  - `email` (string): User email address
      
  - `password` (string): User password
      
  - `phone` (string): User phone number
      

  Example request:

  \`\`\`json  
  {  
  "name": "Alejandro Flores Prieto",  
  "email": "[alejandro@floresprieto2.com](https://mailto:alejandro@floresprieto2.com)",  
  "password": "clavesimple",  
  "phone": "1239072348"  
  }
