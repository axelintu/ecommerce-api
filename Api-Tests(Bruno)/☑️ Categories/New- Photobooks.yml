info:
  name: "New: Photobooks"
  type: http
  seq: 3

http:
  method: POST
  url: "{{APIaddress}}/{{endpoint}}"
  body:
    type: json
    data: |2-
        {
          "urlName": "photobooks",
          "name": "Photobooks y Revistas",
          "description": "Libros de fotografías oficiales, revistas y programas de conciertos. Captura los mejores momentos y visuales de la carrera de tus artistas.",
          "imageURL": "https://placehold.co/800x600.png",
          "parentCategory": null
        }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const id = res.getBody()._id;
        bru.setEnvVar("cat_photobooks", id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  This is a POST request, submitting data to an API via the request body. This request submits JSON data, and the data is reflected in the response.

  A successful POST request typically returns a `200 OK` or `201 Created` response code.
