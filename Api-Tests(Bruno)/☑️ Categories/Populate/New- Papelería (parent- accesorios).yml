info:
  name: "New: Papelería (parent: accesorios)"
  type: http
  seq: 9

http:
  method: POST
  url: "{{APIaddress}}/artists"
  body:
    type: json
    data: |-
      {
        "urlName": "stationery",
        "name": "Vinilos / LP",
        "description": "Ediciones especiales en vinilo para los amantes del sonido analógico. Una pieza de colección imprescindible para cualquier audiófilo.",
        "imageURL": "https://placehold.co/800x600.png",
        "parentCategory": "{{cat_accesorios}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        console.log(data);

        // Safety check: Ensure data exists and is an object
        if (data && typeof data === 'object') {
          const {_id} = data;

          bru.setVar("cat_stationery", _id);
        } else {
          console.error("No data received in response body");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

