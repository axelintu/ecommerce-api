info:
  name: "New: Figuras Acrílico (parent: accesorios)"
  type: http
  seq: 8

http:
  method: POST
  url: "{{APIaddress}}/{{endpoint}}"
  body:
    type: json
    data: |-
      {
        "urlName": "acrylic-stands",
        "name": "Figuras de Acrílico",
        "description": "Figuras coleccionables de acrílico de alta calidad. Ideales para decorar tu escritorio o estantería con las siluetas de tus artistas favoritos.",
        "imageURL": "https://placehold.co/800x600.png",
        "parentCategory": "{{cat_accessories}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const id = res.getBody()._id;
        bru.setEnvVar("cat_acrylicstands", id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  This is a POST request, submitting data to an API via the request body. This request submits JSON data, and the data is reflected in the response.

  A successful POST request typically returns a `200 OK` or `201 Created` response code.
