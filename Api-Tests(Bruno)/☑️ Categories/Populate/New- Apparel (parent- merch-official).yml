info:
  name: "New: Apparel (parent: merch-official)"
  type: http
  seq: 5

http:
  method: POST
  url: "{{APIaddress}}/artists"
  body:
    type: json
    data: |2-
        {
            "urlName": "apparel",
            "name": "Ropa Exclusiva/Merch Oficial",
            "description": "Camisetas, sudaderas y prendas de ropa oficial de tus bandas y artistas favoritos. Llevá el estilo de tu artista a todos lados.",
            "imageURL": "https://placehold.co/800x600.png",
            "parentCategory": "{{cat_merch-oficial}}"
          }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const data = res.getBody();
        console.log(data);

        // Safety check: Ensure data exists and is an object
        if (data && typeof data === 'object') {
          const {_id} = data;

          bru.setVar("cat_apparel", _id);
        } else {
          console.error("No data received in response body");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  This is a POST request, submitting data to an API via the request body. This request submits JSON data, and the data is reflected in the response.

  A successful POST request typically returns a `200 OK` or `201 Created` response code.
