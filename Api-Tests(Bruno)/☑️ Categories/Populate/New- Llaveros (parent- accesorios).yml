info:
  name: "New: Llaveros (parent: accesorios)"
  type: http
  seq: 7

http:
  method: POST
  url: "{{APIaddress}}/{{endpoint}}"
  body:
    type: json
    data: |-
      {
        "urlName": "keychains",
        "name": "Llaveros",
        "description": "Pequeños accesorios decorativos para llevar contigo. Desde llaveros de peluche hasta diseños exclusivos de tus artistas.",
        "imageURL": "https://placehold.co/800x600.png",
        "parentCategory": "{{cat_accessories}}"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const id = res.getBody()._id;
        bru.setEnvVar("cat_keychains", id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  This is a POST request, submitting data to an API via the request body. This request submits JSON data, and the data is reflected in the response.

  A successful POST request typically returns a `200 OK` or `201 Created` response code.
